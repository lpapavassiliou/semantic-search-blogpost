<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', sans-serif">
  <defs>
    <clipPath id="chartClip">
      <rect x="60" y="40" width="600" height="270"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" fill="#111111" rx="8"/>

  <!-- Title -->
  <text x="60" y="28" fill="#e8e8e8" font-size="14" font-weight="600">Latency percentiles</text>

  <!-- Chart area border -->
  <rect x="60" y="40" width="600" height="270" fill="none" stroke="#222222" stroke-width="1"/>

  <!-- Horizontal grid lines and Y-axis labels -->
  <!-- y scale: y=310 is 0s, y=40 is 60s (270px for 60s, 4.5px/s) -->
  <line x1="60" y1="310" x2="660" y2="310" stroke="#222222" stroke-width="1"/>
  <text x="52" y="314" fill="#999999" font-size="11" text-anchor="end">0 s</text>

  <line x1="60" y1="220" x2="660" y2="220" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="52" y="224" fill="#999999" font-size="11" text-anchor="end">20 s</text>

  <line x1="60" y1="130" x2="660" y2="130" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="52" y="134" fill="#999999" font-size="11" text-anchor="end">40 s</text>

  <line x1="60" y1="40" x2="660" y2="40" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="52" y="44" fill="#999999" font-size="11" text-anchor="end">1 min</text>

  <!-- Vertical grid lines and X-axis labels -->
  <!-- x scale: x=60 is 09:45, x=660 is 11:45 (600px for 120min, 5px/min) -->
