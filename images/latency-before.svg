  <text x="135" y="328" fill="#999999" font-size="10" text-anchor="middle">10:00</text>

  <line x1="210" y1="40" x2="210" y2="310" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="210" y="328" fill="#999999" font-size="10" text-anchor="middle">10:15</text>

  <line x1="285" y1="40" x2="285" y2="310" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="285" y="328" fill="#999999" font-size="10" text-anchor="middle">10:30</text>

  <line x1="360" y1="40" x2="360" y2="310" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
