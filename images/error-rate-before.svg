<svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', sans-serif">
  <defs>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="350" rx="8" fill="#111111"/>

  <!-- Title -->
  <text x="70" y="30" fill="#e8e8e8" font-size="13" font-weight="600">Error rate %</text>

  <!-- Chart area: x=70..660, y=45..280 -->
  <!-- Y-axis grid lines and labels -->
  <!-- 100% => y=45, 80% => y=92, 60% => y=139, 40% => y=186, 20% => y=233, 0% => y=280 -->

  <!-- Horizontal grid lines -->
  <line x1="70" y1="45" x2="660" y2="45" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="92" x2="660" y2="92" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="139" x2="660" y2="139" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="186" x2="660" y2="186" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="233" x2="660" y2="233" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="280" x2="660" y2="280" stroke="#222222" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="60" y="49" fill="#999999" font-size="10" text-anchor="end">100%</text>
  <text x="60" y="96" fill="#999999" font-size="10" text-anchor="end">80%</text>
  <text x="60" y="143" fill="#999999" font-size="10" text-anchor="end">60%</text>
  <text x="60" y="190" fill="#999999" font-size="10" text-anchor="end">40%</text>
  <text x="60" y="237" fill="#999999" font-size="10" text-anchor="end">20%</text>
  <text x="60" y="284" fill="#999999" font-size="10" text-anchor="end">0%</text>

  <!-- Vertical grid lines at 15-min intervals -->
  <!-- Time range: 09:45 to 11:45 = 120 min, chart width = 590px -->
  <!-- 09:45 => x=70, 10:00 => x=143.75, 10:15 => x=217.5, 10:30 => x=291.25, 10:45 => x=365 -->
  <!-- 11:00 => x=438.75, 11:15 => x=512.5, 11:30 => x=586.25, 11:45 => x=660 -->

  <line x1="70" y1="45" x2="70" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="143.75" y1="45" x2="143.75" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="217.5" y1="45" x2="217.5" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="291.25" y1="45" x2="291.25" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="365" y1="45" x2="365" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="438.75" y1="45" x2="438.75" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="512.5" y1="45" x2="512.5" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="586.25" y1="45" x2="586.25" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="660" y1="45" x2="660" y2="280" stroke="#222222" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="70" y="296" fill="#999999" font-size="10" text-anchor="middle">09:45</text>
  <text x="143.75" y="296" fill="#999999" font-size="10" text-anchor="middle">10:00</text>
  <text x="217.5" y="296" fill="#999999" font-size="10" text-anchor="middle">10:15</text>
  <text x="291.25" y="296" fill="#999999" font-size="10" text-anchor="middle">10:30</text>
  <text x="365" y="296" fill="#999999" font-size="10" text-anchor="middle">10:45</text>
  <text x="438.75" y="296" fill="#999999" font-size="10" text-anchor="middle">11:00</text>
  <text x="512.5" y="296" fill="#999999" font-size="10" text-anchor="middle">11:15</text>
  <text x="586.25" y="296" fill="#999999" font-size="10" text-anchor="middle">11:30</text>
  <text x="660" y="296" fill="#999999" font-size="10" text-anchor="middle">11:45</text>

  <!-- Data line path -->
  <!-- Mapping: x = 70 + (minutes_from_start / 120) * 590 -->
  <!--          y = 280 - (percent / 100) * 235 -->
  <!-- Key points: -->
  <!-- 09:45 (0min)  0%   => x=70,     y=280 -->
  <!-- 10:00 (15min) 0%   => x=143.75, y=280 -->
  <!-- 10:03 (18min) 0%   => x=158.5,  y=280 -->
  <!-- 10:05 (20min) 25%  => x=168.3,  y=221.25 -->
  <!-- 10:08 (23min) 70%  => x=183,    y=115.5 -->
  <!-- 10:10 (25min) 100% => x=192.9,  y=45 -->
  <!-- 10:15 (30min) 100% => x=217.5,  y=45 -->
  <!-- 10:20 (35min) 100% => x=242.1,  y=45 -->
  <!-- 10:25 (40min) 10%  => x=266.7,  y=256.5 -->
  <!-- 10:28 (43min) 5%   => x=281.5,  y=268.25 -->
  <!-- 10:30 (45min) 4%   => x=291.25, y=270.6 -->
  <!-- 10:35 (50min) 5%   => x=315.8,  y=268.25 -->
  <!-- 10:38 (53min) 3%   => x=328.7,  y=272.95 -->
  <!-- 10:42 (57min) 5%   => x=350.4,  y=268.25 -->
  <!-- 10:45 (60min) 3%   => x=365,    y=272.95 -->
  <!-- 10:50 (65min) 4%   => x=389.6,  y=270.6 -->
  <!-- 10:55 (70min) 2%   => x=414.2,  y=275.3 -->
  <!-- 11:00 (75min) 2%   => x=438.75, y=275.3 -->
  <!-- 11:05 (80min) 1%   => x=463.3,  y=277.65 -->
  <!-- 11:10 (85min) 2%   => x=487.9,  y=275.3 -->
  <!-- 11:15 (90min) 1%   => x=512.5,  y=277.65 -->
  <!-- 11:18 (93min) 3%   => x=527.4,  y=272.95 -->
  <!-- 11:22 (97min) 1%   => x=547.1,  y=277.65 -->
  <!-- 11:27 (102min) 0.5% => x=571.8, y=278.8 -->
  <!-- 11:30 (105min) 0.5% => x=586.25, y=278.8 -->
  <!-- 11:35 (110min) 1%  => x=610.8,  y=277.65 -->
  <!-- 11:40 (115min) 0.3% => x=635.4, y=279.3 -->
  <!-- 11:45 (120min) 0.2% => x=660,   y=279.5 -->

  <!-- Fill area under the curve -->
  <path d="
    M 70 280
    L 143.75 280
    L 158.5 280
    L 168.3 221.25
    L 183 115.5
    L 192.9 45
    L 217.5 45
    L 242.1 45
    L 266.7 256.5
    L 281.5 268.25
    L 291.25 270.6
    L 315.8 268.25
    L 328.7 272.95
    L 350.4 268.25
    L 365 272.95
    L 389.6 270.6
    L 414.2 275.3
    L 438.75 275.3
    L 463.3 277.65
    L 487.9 275.3
    L 512.5 277.65
    L 527.4 272.95
    L 547.1 277.65
    L 571.8 278.8
    L 586.25 278.8
    L 610.8 277.65
    L 635.4 279.3
    L 660 279.5
    L 660 280
    Z
  " fill="url(#greenFill)"/>

  <!-- Data line -->
  <polyline
    points="
      70,280
      143.75,280
      158.5,280
      168.3,221.25
      183,115.5
      192.9,45
      217.5,45
      242.1,45
      266.7,256.5
      281.5,268.25
      291.25,270.6
      315.8,268.25
      328.7,272.95
      350.4,268.25
      365,272.95
      389.6,270.6
      414.2,275.3
      438.75,275.3
      463.3,277.65
      487.9,275.3
      512.5,277.65
      527.4,272.95
      547.1,277.65
      571.8,278.8
      586.25,278.8
      610.8,277.65
      635.4,279.3
      660,279.5
    "
    fill="none"
    stroke="#ef4444"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Legend -->
  <circle cx="290" cy="325" r="4" fill="#ef4444"/>
  <text x="300" y="329" fill="#999999" font-size="11">Error rate %</text>

  <!-- Axis lines -->
  <line x1="70" y1="280" x2="660" y2="280" stroke="#333333" stroke-width="1"/>
  <line x1="70" y1="45" x2="70" y2="280" stroke="#333333" stroke-width="1"/>
</svg>