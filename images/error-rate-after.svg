<svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', sans-serif">
  <defs>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="350" rx="8" fill="#111111"/>

  <!-- Title -->
  <text x="70" y="30" fill="#e8e8e8" font-size="13" font-weight="600">Error rate %</text>

  <!-- Horizontal grid lines -->
  <line x1="70" y1="45" x2="660" y2="45" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="92" x2="660" y2="92" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="139" x2="660" y2="139" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="186" x2="660" y2="186" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="233" x2="660" y2="233" stroke="#222222" stroke-width="1"/>
  <line x1="70" y1="280" x2="660" y2="280" stroke="#222222" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="60" y="49" fill="#999999" font-size="10" text-anchor="end">100%</text>
  <text x="60" y="96" fill="#999999" font-size="10" text-anchor="end">80%</text>
  <text x="60" y="143" fill="#999999" font-size="10" text-anchor="end">60%</text>
  <text x="60" y="190" fill="#999999" font-size="10" text-anchor="end">40%</text>
  <text x="60" y="237" fill="#999999" font-size="10" text-anchor="end">20%</text>
  <text x="60" y="284" fill="#999999" font-size="10" text-anchor="end">0%</text>

  <!-- Vertical grid lines at 15-min intervals -->
  <!-- Time range: 16:05 to 18:05 = 120 min, chart width = 590px -->
  <!-- 16:05 => x=70, each min = 590/120 = 4.917px -->
  <line x1="70" y1="45" x2="70" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="119.2" y1="45" x2="119.2" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="192.9" y1="45" x2="192.9" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="266.7" y1="45" x2="266.7" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="340.4" y1="45" x2="340.4" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="414.2" y1="45" x2="414.2" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="487.9" y1="45" x2="487.9" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="561.7" y1="45" x2="561.7" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="635.4" y1="45" x2="635.4" y2="280" stroke="#222222" stroke-width="1"/>
  <line x1="660" y1="45" x2="660" y2="280" stroke="#222222" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="70" y="296" fill="#999999" font-size="10" text-anchor="middle">16:05</text>
  <text x="119.2" y="296" fill="#999999" font-size="10" text-anchor="middle">16:15</text>
  <text x="192.9" y="296" fill="#999999" font-size="10" text-anchor="middle">16:30</text>
  <text x="266.7" y="296" fill="#999999" font-size="10" text-anchor="middle">16:45</text>
  <text x="340.4" y="296" fill="#999999" font-size="10" text-anchor="middle">17:00</text>
  <text x="414.2" y="296" fill="#999999" font-size="10" text-anchor="middle">17:15</text>
  <text x="487.9" y="296" fill="#999999" font-size="10" text-anchor="middle">17:30</text>
  <text x="561.7" y="296" fill="#999999" font-size="10" text-anchor="middle">17:45</text>
  <text x="635.4" y="296" fill="#999999" font-size="10" text-anchor="middle">18:00</text>

  <!-- Data line: flat at 0% -->
  <polyline
    points="70,280 119.2,280 192.9,280 266.7,280 340.4,280 414.2,280 487.9,280 561.7,280 635.4,280 660,280"
    fill="none"
    stroke="#22c55e"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Legend -->
  <circle cx="290" cy="325" r="4" fill="#22c55e"/>
  <text x="300" y="329" fill="#999999" font-size="11">Error rate %</text>

  <!-- Axis lines -->
  <line x1="70" y1="280" x2="660" y2="280" stroke="#333333" stroke-width="1"/>
  <line x1="70" y1="45" x2="70" y2="280" stroke="#333333" stroke-width="1"/>
</svg>
