  <!-- Horizontal grid lines and Y-axis labels -->
  <!-- y scale: y=310 is 0s, y=40 is 50s (270px for 50s, 5.4px/s) -->
  <line x1="60" y1="310" x2="660" y2="310" stroke="#222222" stroke-width="1"/>
  <text x="52" y="314" fill="#999999" font-size="11" text-anchor="end">0 s</text>

  <line x1="60" y1="202" x2="660" y2="202" stroke="#222222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="52" y="206" fill="#999999" font-size="11" text-anchor="end">20 s</text>

